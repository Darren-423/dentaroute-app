version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dentaroute
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/dentaroute
      JWT_SECRET: replace-me-with-a-long-random-secret
      JWT_REFRESH_SECRET: replace-me-with-a-long-random-refresh-secret
      PORT: 3000
      ACCESS_TOKEN_TTL_MIN: 15
      REFRESH_TOKEN_TTL_DAYS: 30
      VERIFICATION_CODE_TTL_MIN: 5
      VERIFICATION_RESEND_SEC: 60
      AUTH_DEV_VERIFICATION_CODE: 123456
      UPLOAD_DIR: ./uploads
    ports:
      - "3000:3000"
    volumes:
      - ./uploads:/app/uploads

volumes:
  postgres-data:
